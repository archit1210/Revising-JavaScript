<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Async in JS</h1>
    <button id="stop">stop</button>
    <script>
        const changeText = function() {
            document.querySelector('h1').innerHTML = 'Archit'
        }

        const changeingHeader = setTimeout(changeText, 4000);
        document.querySelector('#stop').addEventListener('click', function(){
            clearTimeout(changeingHeader)
            console.log('Stopped')
        })

    </script>
</body>
</html>
